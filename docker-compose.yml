services:
  db:
    image: postgres:16-alpine
    container_name: swd-db
    restart: unless-stopped
    ports:
      - "5431:5432"
    environment:
      POSTGRES_USER: swd
      POSTGRES_PASSWORD: swd_local
      POSTGRES_DB: swd
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
    driver: local
